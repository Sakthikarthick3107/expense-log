name: Flutter Build and Deploy

on:
  push:
    branches:
      - main 

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read Release Notes
        id: notes
        run: |
          RELEASE_NOTES=$(cat RELEASE_NOTES.txt)
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          echo "$RELEASE_NOTES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV


      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.6'  

      - name: Install dependencies
        run: flutter pub get
      
      - name: Patch telephony plugin namespace
        run: |
          TELEPHONY_GRADLE="$HOME/.pub-cache/hosted/pub.dev/telephony-0.2.0/android/build.gradle"

          echo "Looking for telephony build.gradle..."
          if [ -f "$TELEPHONY_GRADLE" ]; then
            echo "Found. Injecting namespace..."
            sed -i '/android {/a\    namespace "com.shounakmulay.telephony"' "$TELEPHONY_GRADLE"
          else
            echo "telephony build.gradle not found!"
            exit 1
          fi

      
      - name: Clean Flutter build
        run: flutter clean


      - name: Extract version from pubspec.yaml
        id: extract_version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //g')
          VERSION_TAG="v${VERSION%%+*}" # Use only the version part, ignoring build number after '+'
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV      

      - name: Decode and set up keystore
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_FILE" | base64 --decode > android/app/my-release-key.jks
          echo "storePassword=$KEYSTORE_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "storeFile=../app/my-release-key.jks" >> android/key.properties

      - name: Build APK
        run: flutter build apk --release

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: Release ${{ env.VERSION_TAG }}
          body_path: RELEASE_NOTES.txt
          draft: false
          prerelease: false
          files: build/app/outputs/flutter-apk/app-release.apk
          fail_on_unmatched_files: true

      - name: Save tag_name to file
        run: echo "${{ env.VERSION_TAG }}" > tag_name.txt

      - name: Upload tag_name.txt
        uses: actions/upload-artifact@v4
        with:
         name: release_tag
         path: tag_name.txt

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: build-apk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod repo update

      - name: Install dependencies
        run: flutter pub get

      - name: Install iOS dependencies
        run: |
          cd ios
          pod install
          cd ..

      - name: Build iOS App
        run: flutter build ios --release --no-codesign

      - name: Archive and Export IPA
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          cd Payload
          zip -r ../Runner.ipa .
          cd ..

      - name: Download release tag
        uses: actions/download-artifact@v4
        with:
          name: release_tag

      - name: Read tag into ENV
        run: echo "VERSION_TAG=$(cat tag_name.txt)" >> $GITHUB_ENV

      - name: Upload IPA to Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.VERSION_TAG }}
          files: Runner.ipa
          fail_on_unmatched_files: true

